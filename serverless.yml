# "org" ensures this Service is used with the correct Serverless Framework Access Key.
org: kuldeepdev

# "app" enables Serverless Framework Dashboard features and sharing them with other Services.
app: file-sharing-app

# "service" is the name of this project.
service: file-sharing-app

provider:
  name: aws
  runtime: nodejs20.x
  region: ap-south-1

  httpApi:
    cors:
      allowedOrigins:
        - "*"
      allowedHeaders:
        - "*"
      allowedMethods:
        - GET
        - PUT
        - POST
        - OPTIONS

  iam:
    role:
      statements:
        # ✅ S3 permission (existing — unchanged)
        - Effect: Allow
          Action:
            - s3:PutObject
          Resource:
            - arn:aws:s3:::file-sharing-bucket-demo-123/*

        # ✅ DynamoDB permissions (NEW)
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:Scan
          Resource: "*"

functions:
  # ✅ existing upload API (unchanged)
  getUploadUrl:
    handler: handler.getUploadUrl
    events:
      - httpApi:
          path: /upload-url
          method: get

  # ✅ NEW: list files API
  getFiles:
    handler: handler.getFiles
    events:
      - httpApi:
          path: /files
          method: get

# ✅ NEW: DynamoDB table
resources:
  Resources:
    FilesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: files-table
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST